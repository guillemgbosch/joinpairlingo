<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LingoPair — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--white:#FFFFFF;--ink:#1A1814;--border:#E2DDD6;--accent:#2D5BE3;--muted:#8A8680;--green:#22c55e;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:22px;padding:40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(26,24,20,.08);}
.logo{font-family:'DM Serif Display',serif;font-size:1.3rem;text-align:center;margin-bottom:28px;color:var(--ink);}
.logo sup{font-family:'DM Sans',sans-serif;font-size:.5rem;font-weight:600;text-transform:uppercase;color:var(--accent);vertical-align:super;margin-left:2px;}
h2{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:8px;letter-spacing:-.02em;}
p{font-size:.875rem;color:var(--muted);margin-bottom:24px;line-height:1.6;}
label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:14px;font-family:inherit;font-size:.9rem;outline:none;margin-bottom:16px;transition:border-color .2s;}
input:focus{border-color:var(--accent);}
button{width:100%;padding:13px;background:var(--ink);color:var(--white);border:none;border-radius:50px;font-size:.95rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
button:hover{opacity:.9;}
.msg{text-align:center;font-size:.875rem;margin-top:16px;padding:12px;border-radius:12px;}
.msg.success{background:#dcfce7;color:#16a34a;}
.msg.error{background:#fee2e2;color:#ef4444;}
#loading{text-align:center;color:var(--muted);font-size:.875rem;}
#form{display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">LingoPair<sup>Beta</sup></div>
  
  <div id="loading">Verifying your reset link...</div>
  
  <div id="form">
    <h2>New password</h2>
    <p>Choose a new password for your account.</p>
    <label>New password</label>
    <input type="password" id="pw1" placeholder="Min. 8 characters">
    <label>Confirm password</label>
    <input type="password" id="pw2" placeholder="Repeat your password">
    <button onclick="updatePw()">Update password →</button>
    <div id="msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const client = supabase.createClient(
  'https://kzwptgbhcddebxdfnsqx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6d3B0Z2JoY2RkZWJ4ZGZuc3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4Mjk0NzksImV4cCI6MjA4OTQwNTQ3OX0.9ulqg6eSaH2ONzn4yD3wi6ymQ-aShjx_7nMJuOt3Rps',
  { auth: { detectSessionInUrl: true, persistSession: true } }
);

client.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form').style.display = 'block';
  } else if (event === 'SIGNED_IN' && window.location.hash.includes('type=recovery')) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form').style.display = 'block';
  } else if (!window.location.hash || window.location.hash === '#') {
    document.getElementById('loading').textContent = 'Invalid or expired link. Please request a new password reset.';
  }
});

async function updatePw() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  
  if (pw1.length < 6) { msg.className='msg error'; msg.textContent='Password must be at least 6 characters'; return; }
  if (pw1 !== pw2) { msg.className='msg error'; msg.textContent='Passwords do not match'; return; }
  
  const { error } = await client.auth.updateUser({ password: pw1 });
  if (error) { msg.className='msg error'; msg.textContent='Error: ' + error.message; return; }
  
  msg.className='msg success'; msg.textContent='✅ Password updated!';
  setTimeout(() => window.location.href = 'register.html', 2000);
}
</script>
</body>
</html>

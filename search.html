<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Partner Search</title>\n    <style>\n        :root {\n            --ink: #1A1814;\n            --accent: #2D5BE3;\n            --gold: #C8A96E;\n        }\n        body {\n            font-family: Arial, sans-serif;\n            background-color: var(--ink);\n            color: white;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            display: flex;\n        }\n        .sidebar {\n            width: 240px;\n            padding: 20px;\n            background-color: #2D2C2A;\n        }\n        .main-content {\n            flex: 1;\n            padding: 20px;\n        }\n        .search-bar {\n            margin-bottom: 20px;\n        }\n        .partner-grid {\n            display: grid;\n            grid-template-columns: repeat(3, 1fr);\n            gap: 20px;\n        }\n        .partner-card {\n            background: #3F3C3A;\n            padding: 15px;\n            border-radius: 8px;\n            text-align: center;\n        }\n        .badge {\n            background: var(--accent);\n            color: white;\n            padding: 5px;\n            border-radius: 5px;\n            display: inline-block;\n        }\n        .modal {\n            display: none;\n            position: fixed;\n            z-index: 1;\n            left: 0;\n            top: 0;\n            width: 100%;\n            height: 100%;\n            overflow: auto;\n            background-color: rgb(0,0,0);\n            background-color: rgba(0,0,0,0.4);\n            padding-top: 60px;\n        }\n        .modal-content {\n            background-color: #fefefe;\n            margin: 5% auto;\n            padding: 20px;\n            border: 1px solid #888;\n            width: 80%;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"sidebar\">\n            <h2>Filters</h2>\n            <!-- Add filter options here -->\n        </div>\n        <div class=\"main-content\">\n            <input type=\"text\" class=\"search-bar\" placeholder=\"Search partners...\">\n            <select id=\"language-select\">\n                <option value=\"en\">English</option>\n                <option value=\"es\">Spanish</option>\n                <option value=\"fr\">French</option>\n                <option value=\"de\">German</option>\n                <option value=\"zh\">Chinese</option>\n                <option value=\"ru\">Russian</option>\n                <option value=\"ja\">Japanese</option>\n                <option value=\"pt\">Portuguese</option>\n                <option value=\"it\">Italian</option>\n                <option value=\"ar\">Arabic</option>\n                <option value=\"ko\">Korean</option>\n            </select>\n            <div class=\"partner-grid\">\n                <div class=\"partner-card\">\n                    <img src=\"partner1.jpg\" alt=\"Partner 1\">\n                    <h3>Partner 1</h3>\n                    <div class=\"badge\">80% Compatibility</div>\n                </div>\n                <div class=\"partner-card\">\n                    <img src=\"partner2.jpg\" alt=\"Partner 2\">\n                    <h3>Partner 2</h3>\n                    <div class=\"badge\">75% Compatibility</div>\n                </div>\n                <div class=\"partner-card\">\n                    <img src=\"partner3.jpg\" alt=\"Partner 3\">\n                    <h3>Partner 3</h3>\n                    <div class=\"badge\">90% Compatibility</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <script src=\"https://cdn.jsdelivr.net/npm/@supabase/supabase-js\"></script>\n    <script>\n        // Supabase configuration\n        const supabaseUrl = 'https://your-supabase-url.supabase.co';\n        const supabaseKey = 'your-supabase-public-anon-key';\n        const supabase = supabase.createClient(supabaseUrl, supabaseKey);\n\n        // Real-time search functionality\n        const searchInput = document.querySelector('.search-bar');\n        searchInput.addEventListener('input', async (event) => {\n            const { data, error } = await supabase\n                .from('partners')\n                .select('*')\n                .ilike('name', `%${event.target.value}%`);\n            // Update partner grid based on search result\n        });\n    </script>\n</body>\n</html>\n
